<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODRS Booking Form</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<form id="form" class="form">

<h2>ODRS Booking Form</h2>

<div class="form-control">
<label>Name</label>
<input type="text" id="name" placeholder="Enter Your Name" style="text-transform:uppercase;">
<small>Error message</small>
</div>

<div class="form-control">
    <label>Google Account</label>

    <button type="button" id="googleBtn" class="google-btn" onclick="googleLogin()">
    Sign in with Google
</button>

    <input type="text" id="email" readonly
           placeholder="Sign in with Google first">

    <small id="loginStatus"></small>
</div>

<div class="form-control">
    <label>Phone Number</label>
    <input
        type="tel"
        id="phone"
        placeholder="Enter Your Mobile Number"
        maxlength="10"
        pattern="[0-9]{10}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        required>
    <small>Error message</small>
</div>

<div class="form-control">
    <label for="offer">Select Offer</label>
    <select id="offer">
        <option value="">Choose a Service</option>
        <option value="SkillRack Program Count - ₹800">
            SkillRack Program Count - ₹800
        </option>
        <option value="SkillRack Test - ₹50">
            SkillRack Test - ₹50
        </option>
        <option value="Manual Writing - ₹500">
            Manual Writing - ₹500
        </option>
        <option value="Online Certifications - ₹100">
            Online Certifications - ₹100
        </option>
        <option value="Project Works - ₹300">
            Project Works - ₹300
        </option>
        <option value="Record Works - ₹350">
            Record Works - ₹350
        </option>
        <option value="Github Project Works - ₹300">
            Github Project Works - ₹300
        </option>
        <option value="Github 50+ Star - ₹150">
            Github 50+ Star - ₹150
        </option>
        <option value="Portfolio Build - ₹250">
            Portfolio Build - ₹250
        </option>
        <option value="Resume Build - ₹100">
            Resume Build - ₹100
        </option>
        
    </select>
</div>

<div class="form-control">
<label>Branch & Dept</label>
<input type="text" id="dept" placeholder="Fill Your Detail">
<small>Error message</small>
</div>

<div class="button-group">
    <button type="button" id="backBtn">Back</button>
    <button type="submit">Next</button>
</div>

</form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_ZYwA2il9pZLsgSnY09VQg3PLeZsQfn8",
  authDomain: "odrs-booking.firebaseapp.com",
  projectId: "odrs-booking",
  storageBucket: "odrs-booking.firebasestorage.app",
  messagingSenderId: "1118712128480",
  appId: "1:118712128480:web:307465bf5d52b15bcc5185",
  measurementId: "G-5W22RXPE2S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function () {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    document.getElementById("name").value = user.displayName.toUpperCase();
    document.getElementById("email").value = user.email;
    document.getElementById("loginStatus").innerHTML = "✅ Google Account Verified";

    localStorage.setItem("odrsName", user.displayName);
    localStorage.setItem("odrsEmail", user.email);
  } catch (err) {
    alert(err.message);
  }
};
</script>

<!-- Warning Popup -->
<div id="warningPopup" class="warning-popup">
    <div class="warning-box">
        <div class="warning-icon">⚠️</div>
        <h2>ODRS SECURITY WARNING</h2>
        <p>Unauthorized inspection or source viewing is not allowed.</p>
        <button onclick="closeWarning()">OK</button>
    </div>
</div>

<style>
.warning-popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:99999;
}
.warning-box{
    background:#fff;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:350px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}
.warning-icon{
    font-size:60px;
}
.warning-box h2{
    color:#e53935;
    margin:10px 0;
}
.warning-box p{
    color:#555;
}
.warning-box button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#e53935;
    color:white;
    cursor:pointer;
}
</style>

<script>
function showWarning() {
    document.getElementById("warningPopup").style.display = "flex";
}

function closeWarning() {
    document.getElementById("warningPopup").style.display = "none";
}

// Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
    showWarning();
});

// Keyboard Shortcuts
document.addEventListener("keydown", function(e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && e.key.toUpperCase() === "U")
    ) {
        e.preventDefault();
        showWarning();
    }
});
</script>
    
<script src="script.js"></script>

</body>
</html>
