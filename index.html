<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODRS Booking Form</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<form id="form" class="form">

<h2>ODRS Booking Form</h2>

<div class="form-control">
<label>Name</label>
<input type="text" id="name" placeholder="Enter Your Name" style="text-transform:uppercase;">
<small>Error message</small>
</div>

<div class="form-control">
<label>Email</label>
<input type="email" id="email" placeholder="Enter Your Email">
<small>Error message</small>
</div>

<div class="form-control">
    <label>Phone Number</label>
    <input
        type="tel"
        id="phone"
        placeholder="Enter Your Mobile Number"
        maxlength="10"
        pattern="[0-9]{10}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        required>
    <small>Error message</small>
</div>

<div class="form-control">
    <label for="offer">Select Offer</label>
    <select id="offer">
        <option value="">Choose a Service</option>
        <option value="SkillRack Program Count - ₹800">
            SkillRack Program Count - ₹800
        </option>
        <option value="SkillRack Test - ₹50">
            SkillRack Test - ₹50
        </option>
        <option value="Manual Writing - ₹500">
            Manual Writing - ₹500
        </option>
        <option value="Online Certifications - ₹100">
            Online Certifications - ₹100
        </option>
        <option value="Project Works - ₹150 to ₹300">
            Project Works - ₹150 to ₹300
        </option>
        <option value="Record Works - ₹300 to ₹400">
            Record Works - ₹300 to ₹400
        </option>
    </select>
</div>

<div class="form-control">
<label>Branch & Dept</label>
<input type="text" id="dept" placeholder="Fill Your Detail">
<small>Error message</small>
</div>

<div class="button-group">
    <button type="button" id="backBtn">Back</button>
    <button type="submit">Next</button>
</div>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
