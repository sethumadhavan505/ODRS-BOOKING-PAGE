<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODRS Payment</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container payment-box">

<h2>ODRS TEAM PAYMENT</h2>

<img src="Fam.png" alt="Payment QR" class="qr-img">

<p>Please scan the QR code and complete the payment.</p>

<div class="acknowledgement">
    <input type="checkbox" id="agree">
    <label for="agree">
        I have completed the payment and provided correct details.
    </label>
</div>

<div class="button-group">
    <button type="button" id="backBtn">Back</button>
    <button id="payBtn" disabled>Submit</button>
</div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("2HLt93pZy8mj117BT");

const checkbox = document.getElementById("agree");
const submitBtn = document.getElementById("payBtn");

const backBtn = document.getElementById("backBtn");
    
backBtn.addEventListener("click", function () {
    window.location.href = "index.html";
});
    
checkbox.addEventListener("change", function () {
    submitBtn.disabled = !this.checked;
});

document.getElementById("payBtn").addEventListener("click", function () {

    const name = localStorage.getItem("odrsName");
    const email = localStorage.getItem("odrsEmail");
    const phone = localStorage.getItem("odrsPhone");
    const offer = localStorage.getItem("odrsOffer");
    const dept = localStorage.getItem("odrsDept");

    const templateParams = {
        name: name,
        email: email,
        phone: phone,
        offer: offer,
        dept: dept
    };

    // Send booking details to ODRS

    emailjs.send(
        "service_zxt5qcd",
        "template_w77svvi",
        templateParams
    )

    .then(function () {

        // Send confirmation email to student

        return emailjs.send(
            "service_zxt5qcd",
            "template_5as3c6f",
            templateParams
        );

    })

    .then(function () {

        alert("ODRS TEAM WILL CONTACT YOU");

        localStorage.clear();

        window.location.href = "index.html";

    })

    .catch(function (error) {

        console.error(error);

        alert("Failed to send email. Please try again.");

    });

});

</script>

<!-- Warning Popup -->
<div id="warningPopup" class="warning-popup">
    <div class="warning-box">
        <div class="warning-icon">⚠️</div>
        <h2>ODRS SECURITY WARNING</h2>
        <p>Unauthorized inspection or source viewing is not allowed.</p>
        <button onclick="closeWarning()">OK</button>
    </div>
</div>

<style>
.warning-popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:99999;
}
.warning-box{
    background:#fff;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:350px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}
.warning-icon{
    font-size:60px;
}
.warning-box h2{
    color:#e53935;
    margin:10px 0;
}
.warning-box p{
    color:#555;
}
.warning-box button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#e53935;
    color:white;
    cursor:pointer;
}
</style>

<script>
function showWarning() {
    document.getElementById("warningPopup").style.display = "flex";
}

function closeWarning() {
    document.getElementById("warningPopup").style.display = "none";
}

// Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
    showWarning();
});

// Keyboard Shortcuts
document.addEventListener("keydown", function(e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && e.key.toUpperCase() === "U")
    ) {
        e.preventDefault();
        showWarning();
    }
});
</script>
    
</body>
</html>
